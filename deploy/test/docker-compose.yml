name: ling_test

services:

  ling-server:
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.server
    image: ling-server-test:v1.0
    container_name: ling-test-server
    env_file:
      - ${LING_COMPOSE_ENV_FILE:-.env}
    ports:
      - 32080:8000
    volumes:
      - ${LING_DEPLOY_ROOT:-../data/test}/server/data:/app/data
      - ${LING_DEPLOY_ROOT:-../data/test}/server/logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ling-api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: 1.0
