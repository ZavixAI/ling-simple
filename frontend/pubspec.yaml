name: ling
description: "Cross-platform app for Ling built with Flutter."
publish_to: 'none'

version: 1.0.1+2026060601

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  font_awesome_flutter: ^11.0.0
  flutter_cache_manager: ^3.4.1
  flutter_liquid_glass_plus: ^0.0.7
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.2.1
  flutter_markdown_plus: ^1.0.7
  http: ^1.5.0
  image_picker: ^1.2.0
  json_annotation: ^4.12.0
  markdown: ^7.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  simple_icons: ^16.23.0
  sqlite3_flutter_libs: ^0.6.0+eol
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  webview_flutter: ^4.10.0
  liquid_glass_widgets: ^0.15.4

dev_dependencies:
  build_runner: ^2.6.0
  drift_dev: ^2.34.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.5
  webview_flutter_platform_interface: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo.png
    - assets/branding/logo-circle.png
    - assets/branding/logo-transparent.png
    - assets/branding/logo-transparent-dark.png
  fonts:
    - family: LongCang
      fonts:
        - asset: assets/fonts/LongCang-Regular.ttf

hooks:
  user_defines:
    sqlite3:
      source: process
